version: 2

models:
  - name: stg_workua_jobs_clean
    description: Cleaned staging model for Work.ua job postings.
    columns:
      - name: source_job_uid
        description: Source-specific unique identifier for a job posting.
        data_tests:
          - not_null
          - unique

      - name: job_url
        description: Original job posting URL.
        data_tests:
          - not_null

      - name: source
        description: Source system name.
        data_tests:
          - not_null
          - accepted_values:
              values: ['workua']

      - name: remote_type
        description: Classified remote work type.
        data_tests:
          - accepted_values:
              values: ['remote', 'hybrid', 'onsite', 'unknown']

      - name: seniority
        description: Classified seniority level extracted from job text.
        data_tests:
          - accepted_values:
              values: ['junior', 'middle', 'senior', 'lead', 'unknown']

