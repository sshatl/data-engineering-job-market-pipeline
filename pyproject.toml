[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["lib"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=airflow/dags/lib --cov=spark/jobs/common --cov-report=term-missing --cov-report=xml"

[tool.coverage.run]
omit = ["tests/*"]